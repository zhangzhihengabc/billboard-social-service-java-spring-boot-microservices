spring:
  application:
    name: billboard-social-service

  config:
    import: "configserver:${CONFIG_SERVER_URL:https://configurationcentral.pineapps.online}"

  cloud:
    config:
      uri: "${CONFIG_SERVER_URL:https://configurationcentral.pineapps.online}"
      username: "${CONFIG_USER_NAME:configuser}"
      password: "${CONFIG_PASSWORD:configpassword}"
      fail-fast: true
      retry:
        initial-interval: 1000
        max-attempts: 6
        max-interval: 2000
        multiplier: 1.1
    bus:
      enabled: true
