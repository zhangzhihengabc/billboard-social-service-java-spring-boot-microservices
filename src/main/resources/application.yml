server:
  port: 8082

spring:
  jackson:
    # Format dates in ISO 8601 with timezone
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC
    date-format: "yyyy-MM-dd'T'HH:mm:ss.SSSSSS'Z'"
  application:
    name: social-service
  datasource:
    url: jdbc:postgresql://localhost:5432/billboard_social
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:root}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  cache:
    type: redis
    redis:
      time-to-live: 3600000

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8762/eureka}
  instance:
    prefer-ip-address: true

jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-here-make-it-long-enough}
  expiration: 86400000

app:
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://localhost:8080}
  rabbitmq:
    exchange: social-events
  mail:
    from: ${MAIL_FROM:uditmehta100@gmail.com}
  base-url: ${APP_BASE_URL:http://localhost:3000}
  group:
    invitation:
      default-expiration-days: 7
      max-pending-per-user: 100

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.billboard.social: DEBUG
    org.springframework.security: INFO

# Merged service domains
social:
  graph:
    max-friends: 5000
    max-followers: 100000
    max-blocks: 1000
  group:
    max-members: 50000
    max-admins: 100
    max-user-groups: 500
  event:
    max-attendees: 10000
    max-user-events: 100
    reminder-hours-before: 24

# Identity service URL (for Feign client)
identity-service:
  url: http://localhost:8081

# Mail configuration
spring.mail:
  host: ${MAIL_HOST:smtp.gmail.com}
  port: ${MAIL_PORT:587}
  username: ${MAIL_USERNAME:uditmehta100@gmail.com}
  password: ${MAIL_PASSWORD:ndvgvsmlbxvhjefn}
  properties:
    mail:
      smtp:
        auth: true
        starttls:
          enable: true
          required: true
        connectiontimeout: 5000
        timeout: 5000
        writetimeout: 5000
